<div class="register-page">
  <div class="register-card">
    <div class="brand" aria-hidden="true">
      <img class="brand-logo" src="assets/AutoMed_logo.png" alt="AutoMed" />
    </div>

    <h1 class="title">Crear una Cuenta</h1>

    <div class="form-box">
      <form (ngSubmit)="onSubmit()" autocomplete="on">
        <div class="field">
          <label for="dni">DNI / NIE</label>
          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4.2-7.3 4.57a2 2 0 0 1-2.14 0L4 8.2V6l7.7 4.8a.5.5 0 0 0 .54 0L20 6v2.2Z"
                />
              </svg>
            </span>

            <input
              id="dni"
              type="text"
              [(ngModel)]="dni"
              name="dni"
              placeholder="DNI / NIE"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="field">
          <label for="fullName">Nombre Completo</label>
          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2-8 4.5V20h16v-1.5C20 16 16.42 14 12 14Z"
                />
              </svg>
            </span>

            <input
              id="fullName"
              type="text"
              [(ngModel)]="fullName"
              name="fullName"
              placeholder="Nombre completo"
              required
              autocomplete="name"
            />
          </div>
        </div>

        <div class="field">
          <label for="email">Email (Opcional)</label>
          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4.2-7.3 4.57a2 2 0 0 1-2.14 0L4 8.2V6l7.7 4.8a.5.5 0 0 0 .54 0L20 6v2.2Z"
                />
              </svg>
            </span>

            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="tu@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V6Zm3 10.73V17a1 1 0 1 1-2 0v-.27a2 2 0 1 1 2 0Z"
                />
              </svg>
            </span>

            <input
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Contraseña"
              required
              autocomplete="new-password"
            />
          </div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V6Zm3 10.73V17a1 1 0 1 1-2 0v-.27a2 2 0 1 1 2 0Z"
                />
              </svg>
            </span>

            <input
              id="confirmPassword"
              type="password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Confirmar Contraseña"
              required
              autocomplete="new-password"
            />
          </div>
        </div>

        <button
          class="primary-btn"
          type="submit"
          [disabled]="
            !dni || !fullName || !password || password !== confirmPassword
          "
        >
          Registrarse
        </button>

        <p class="login-link">
          ¿Ya tienes una cuenta?
          <a class="link" href="/auth/login">Inicia Sesión</a>
        </p>
      </form>
    </div>

    <div class="illu-left" aria-hidden="true">
      <img class="illu" src="assets/doctor.png" alt="" />
    </div>
  </div>
</div>
