<div class="forgot-page">
  <div class="forgot-card">
    <div class="brand">
      <img class="brand-logo" src="assets/AutoMed_logo.png" alt="AutoMed" />
    </div>

    <h1 class="title">Recordar Contraseña</h1>

    <div class="form-box">
      <form (ngSubmit)="onSubmit()" autocomplete="on">
        <div class="success-message" *ngIf="successMessage" role="status">
          {{ successMessage }}
        </div>

        <div class="error-message" *ngIf="errorMessage" role="alert">
          {{ errorMessage }}
        </div>

        <div class="field">
          <label for="email">Correo electrónico</label>

          <div class="input-with-icon">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4.2-7.3 4.57a2 2 0 0 1-2.14 0L4 8.2V6l7.7 4.8a.5.5 0 0 0 .54 0L20 6v2.2Z"
                />
              </svg>
            </span>

            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="tu@email.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <button
          class="primary-btn"
          type="submit"
          [disabled]="!isFormValid || isSubmitting"
        >
          {{ isSubmitting ? "Enviando..." : "Enviar nueva contraseña" }}
        </button>

        <p class="login-link">
          ¿Ya tienes contraseña?
          <a class="link" routerLink="/auth/login">Inicia Sesión</a>
        </p>
      </form>
    </div>

    <div class="illu-left" aria-hidden="true">
      <img class="illu" src="assets/woman_2.png" alt="" />
    </div>
  </div>
</div>
