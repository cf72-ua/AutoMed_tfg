<nav class="nav">
  
  <a class="brand" routerLink="/">
    <span class="brand-frame">
      <img class="brand-logo" src="assets/AutoMed_logo.png" alt="AutoMed" />
    </span>
  </a>

  
  <div class="nav-right">
    
    <ng-container *ngIf="!isLoggedIn()">
      <div class="links">
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Inicio</a
        >
        <a routerLink="/servicios" routerLinkActive="active">Servicios</a>
        <a routerLink="/contacto" routerLinkActive="active">Contacto</a>
      </div>

      <div class="cta">
        <a
          class="btn btn-green"
          routerLink="/auth/login"
          [queryParams]="{ as: 'paciente' }"
          >Pacientes</a
        >
        <a
          class="btn btn-blue"
          routerLink="/auth/login"
          [queryParams]="{ as: 'doctor' }"
          >Doctores</a
        >
      </div>
    </ng-container>

    
    <ng-container *ngIf="isLoggedIn()">
      <div class="logged">
        
        <div class="search-container">
          <button
            class="search-btn"
            type="button"
            (click)="toggleSearch()"
            aria-label="Búsqueda"
            title="Presiona Cmd+K para buscar"
          >
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path
                fill="currentColor"
                d="M15.5 1h-8C6.12 1 5 2.12 5 3.5v17C5 21.88 6.12 23 7.5 23h8c1.38 0 2.5-1.12 2.5-2.5v-17C18 2.12 16.88 1 15.5 1zm-4 21c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3.5-9H5V4h10v9z"
              />
            </svg>
            <span class="search-label">Buscar...</span>
            <span class="search-kbd">⌘K</span>
          </button>

          
          <div class="search-modal" *ngIf="searchOpen()">
            <div class="search-content" (click)="$event.stopPropagation()">
              <div class="search-input-wrapper">
                <svg
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  class="search-icon"
                >
                  <path
                    fill="currentColor"
                    d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
                  />
                </svg>
                <input
                  #searchInput
                  type="text"
                  class="search-input"
                  placeholder="Buscar..."
                  [value]="searchQuery()"
                  (input)="onSearchInput($any($event.target).value)"
                  (keydown.escape)="closeSearch()"
                />
                <button
                  class="search-close"
                  type="button"
                  (click)="closeSearch()"
                  aria-label="Cerrar búsqueda"
                  *ngIf="searchQuery().length > 0"
                >
                  ✕
                </button>
              </div>

              
              <div class="search-results" *ngIf="searchResults().length > 0">
                <div
                  class="search-result-item"
                  *ngFor="let result of searchResults()"
                  (click)="navigateToResult(result.path)"
                >
                  <div class="result-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                      <path
                        fill="currentColor"
                        d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"
                      />
                    </svg>
                  </div>
                  <div class="result-content">
                    <div class="result-label">{{ result.label }}</div>
                    <div class="result-category" *ngIf="result.category">
                      {{ result.category }}
                    </div>
                  </div>
                  <div class="result-kbd">↵</div>
                </div>
              </div>

              
              <div
                class="search-empty"
                *ngIf="searchQuery().length > 0 && searchResults().length === 0"
              >
                <p>No se encontraron resultados para "{{ searchQuery() }}"</p>
              </div>

              
              <div class="search-hints" *ngIf="searchQuery().length === 0">
                <div class="hint-title">Buscar en</div>
                <button
                  class="hint-item"
                  type="button"
                  (click)="navigateToResult('/dashboard')"
                >
                  <svg viewBox="0 0 24 24" width="18" height="18">
                    <path
                      fill="currentColor"
                      d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"
                    />
                  </svg>
                  Dashboard
                </button>
                <button
                  class="hint-item"
                  type="button"
                  (click)="navigateToResult('/calendar')"
                  *ngIf="role() === 'PACIENTE'"
                >
                  <svg viewBox="0 0 24 24" width="18" height="18">
                    <path
                      fill="currentColor"
                      d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"
                    />
                  </svg>
                  Calendario
                </button>
              </div>

              <div class="search-footer">
                <span class="footer-kbd">ESC</span> para cerrar
              </div>
            </div>

            
            <div class="search-overlay" (click)="closeSearch()"></div>
          </div>
        </div>

        
        <a
          class="icon-btn notification-link"
          routerLink="/notificaciones"
          routerLinkActive="active"
          aria-label="Notificaciones"
          [class.has-alert]="unreadNotifications() > 0"
        >
          <svg viewBox="0 0 24 24" width="26" height="26">
            <path
              fill="currentColor"
              d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.71V3a2 2 0 0 0-4 0v1.29A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z"
            />
          </svg>
          <span class="notification-badge" *ngIf="unreadNotifications() > 0">
            {{ unreadNotifications() > 9 ? "9+" : unreadNotifications() }}
          </span>
        </a>

        
        <a
          class="nav-link"
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Inicio
        </a>

        
        <div class="user-menu" [class.open]="menuOpen">
          <button
            class="user-btn"
            type="button"
            (click)="toggleMenu()"
            aria-label="Menú de usuario"
          >
            <span class="user-avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="28" height="28">
                <path
                  fill="currentColor"
                  d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2-8 4.5V20h16v-1.5C20 16 16.42 14 12 14Z"
                />
              </svg>
            </span>

            <span class="user-text">Hola, {{ role() || "Usuario" }}</span>

            <span class="chev" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path fill="currentColor" d="M7 10l5 5 5-5z" />
              </svg>
            </span>
          </button>

          <div class="dropdown" *ngIf="menuOpen">
            <a
              class="dropdown-item link-item"
              [routerLink]="
                role() === 'DOCTOR'
                  ? '/profile/professional'
                  : '/profile/patient'
              "
              (click)="closeMenu()"
            >
              Perfil
            </a>
            <button class="dropdown-item" type="button" (click)="logout()">
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      
      <div class="overlay" *ngIf="menuOpen" (click)="closeMenu()"></div>
    </ng-container>
  </div>
</nav>
